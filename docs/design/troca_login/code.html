<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        darkMode: "class",

          extend: {

              "surface-container": "#171a1e",
              "error-dim": "#d7383b",
              "outline": "#73757a",
              "tertiary-fixed-dim": "#ff788c",
              "tertiary-container": "#fb2a60",
              "primary-fixed-dim": "#718bff",
              "surface-tint": "#97a9ff",
              "surface-dim": "#0c0e12",
              "inverse-primary": "#124af1",
              "surface-variant": "#22262b",
              "primary-fixed": "#849aff",
              "secondary-fixed-dim": "#00ec9a",
              "on-tertiary-fixed-variant": "#780026",
              "on-secondary-fixed-variant": "#00653f",
              "surface-container-high": "#1c2025",
              "error": "#ff716c",
              "on-primary": "#002283",
              "on-secondary-container": "#e1ffe9",
              "tertiary-fixed": "#ff909e",
              "on-secondary": "#005a38",
              "primary-dim": "#3e65ff",
              "on-error-container": "#ffa8a3",
              "surface-container-low": "#111417",
              "surface-container-highest": "#22262b",
              "background": "#0c0e12",
              "tertiary": "#ff6e84",
              "outline-variant": "#46484c",
              "on-primary-fixed": "#000000",
              "secondary": "#1dfba5",
              "inverse-surface": "#f8f9fe",
              "secondary-fixed": "#1dfba5",
              "on-tertiary-fixed": "#39000e",
              "on-secondary-fixed": "#00452a",
              "on-tertiary": "#480013",
              "secondary-container": "#006c44",
              "primary-container": "#849aff",
              "surface-container-lowest": "#000000",
              "on-surface": "#f8f9fe",
              "secondary-dim": "#00ec9a",
              "tertiary-dim": "#e51152",
              "on-error": "#490006",
              "primary": "#97a9ff",
              "surface-bright": "#282c32",
              "on-background": "#f8f9fe",
              "surface": "#0c0e12",
              "on-tertiary-container": "#000000",
              "on-surface-variant": "#a9abb0",
              "inverse-on-surface": "#535559",
              "on-primary-fixed-variant": "#00207d",
              "on-primary-container": "#001967",
              "error-container": "#9f0519"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0c0e12;
            color: #f8f9fe;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }
        .neon-glow {
            text-shadow: 0 0 15px rgba(151, 169, 255, 0.4);
        }
        .btn-glow {
            box-shadow: 0 0 20px rgba(151, 169, 255, 0.2);
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(28, 32, 37, 0.7) 0%, rgba(12, 14, 18, 0.8) 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 sm:p-6 md:p-8">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 overflow-hidden -z-10">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-[150px]"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full opacity-20 pointer-events-none" data-alt="Subtle grid pattern on dark background" style="background-image: radial-gradient(#46484c 0.5px, transparent 0.5px); background-size: 32px 32px;"></div>
</div>
<!-- Main Login Canvas -->
<main class="w-full max-w-[440px] z-10">
<div class="glass-panel border border-outline-variant/15 rounded-xl p-8 md:p-12 shadow-2xl">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-10">
<h1 class="font-headline text-4xl font-black text-primary tracking-widest uppercase neon-glow mb-2">TROCA</h1>
<p class="font-label text-on-surface-variant text-sm tracking-[0.2em] uppercase">Enter the Kinetic Void</p>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-[10px] text-on-surface-variant uppercase tracking-widest pl-1">Identidade Digital</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-xl">alternate_email</span>
<input class="w-full bg-surface-container-low border-0 rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/30 transition-all outline-none" placeholder="nome@exemplo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-[10px] text-on-surface-variant uppercase tracking-widest">Código de Acesso</label>
<a class="text-[10px] text-primary/70 hover:text-primary uppercase tracking-widest transition-colors" href="#">Esqueceu?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-xl">lock</span>
<input class="w-full bg-surface-container-low border-0 rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/30 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-primary-fixed text-on-primary font-headline font-bold text-lg py-4 rounded-lg transition-all active:scale-[0.98] btn-glow flex items-center justify-center gap-2 group" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-10">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="font-label text-[10px] text-on-surface-variant uppercase tracking-widest">Conectar via</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-high hover:bg-surface-variant border border-outline-variant/10 py-3 rounded-lg transition-colors group">
<svg class="w-5 h-5 opacity-80 group-hover:opacity-100 transition-opacity" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body text-xs font-semibold tracking-wide">Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container-high hover:bg-surface-variant border border-outline-variant/10 py-3 rounded-lg transition-colors group">
<svg class="w-5 h-5 fill-on-surface opacity-80 group-hover:opacity-100 transition-opacity" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.04 1.72-3.23 1.72-1.16 0-1.54-.71-2.91-.71-1.35 0-1.84.71-2.91.71-1.19 0-2.31-.83-3.27-1.78-1.96-1.92-3.48-5.46-3.48-8.52 0-3.09 1.58-4.72 3.12-4.72 1.13 0 2.03.63 2.8.63.74 0 1.83-.72 3.1-.72 1.49 0 3.01.81 3.75 1.79-2.07 1.25-1.74 4.31.63 5.36-.91 2.21-2.14 4.54-3.6 6.04zM12.03 5.48c-.06-2.08 1.4-3.85 3.3-4.48.15 2.18-1.74 4.19-3.3 4.48z"></path>
</svg>
<span class="font-body text-xs font-semibold tracking-wide">Apple</span>
</button>
</div>
<!-- Footer Links -->
<div class="mt-12 text-center">
<p class="text-on-surface-variant text-xs mb-4">Novo na arena?</p>
<button class="font-label text-[10px] text-primary uppercase tracking-[0.2em] hover:opacity-80 transition-opacity">Criar Nova Conta</button>
</div>
</div>
<!-- Technical Metadata -->
<div class="mt-8 flex justify-between items-center px-4 opacity-30">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></div>
<span class="font-label text-[8px] tracking-widest uppercase">Servidor: Online</span>
</div>
<span class="font-label text-[8px] tracking-widest uppercase">v.2.0.4-NEON</span>
</div>
</main>
<!-- Side Decorative Badge -->
<div class="fixed right-8 top-1/2 -translate-y-1/2 hidden xl:block pointer-events-none select-none">
<div class="vertical-text font-label text-[10px] text-outline-variant uppercase tracking-[1em] whitespace-nowrap rotate-180" style="writing-mode: vertical-rl;">
            EST. 2024 — PROTOCOLO TROCA
        </div>
</div>
</body></html>
